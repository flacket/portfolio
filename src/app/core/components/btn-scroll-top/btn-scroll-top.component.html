<button
  id="scroll-top"
  class="scroll-top"
  [class.visible]="isShowScrollButton()"
  aria-label="Scroll to top"
  (click)="scrollToTop()"
>
  <svg
    width="24"
    height="24"
    viewBox="0 0 24 24"
    fill="none"
    stroke="currentColor"
    stroke-width="2"
  >
    <polyline points="18 15 12 9 6 15"></polyline>
  </svg>
</button>
